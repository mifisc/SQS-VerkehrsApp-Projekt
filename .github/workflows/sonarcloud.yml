name: SonarCloud analysis

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  analysis:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build backend
        working-directory: backend/sqs-verkehrsapp
        run: ./mvnw -B verify

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run build

      - name: Analyze with SonarCloud
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=mifisc_SQS-VerkehrsApp-Projekt
            -Dsonar.organization=mifisc
            -Dsonar.sources=backend/sqs-verkehrsapp/src/main/java,frontend/src
            -Dsonar.tests=backend/sqs-verkehrsapp/src/test/java
