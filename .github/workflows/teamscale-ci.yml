name: Teamscale analysis

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  teamscale:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Java Testwise Coverage upload to Teamscale
        working-directory: backend/sqs-verkehrsapp
        run: |
          ./mvnw -B clean \
            com.teamscale:teamscale-maven-plugin:prepare-tia-unit-test \
            test \
            com.teamscale:teamscale-maven-plugin:prepare-tia-unit-test \
            com.teamscale:teamscale-maven-plugin:testwise-coverage-report \
            com.teamscale:teamscale-maven-plugin:upload-coverage \
            -DteamscaleUrl=${{ secrets.TEAMSCALE_SERVER }} \
            -DprojectId=${{ secrets.TEAMSCALE_BACKEND }} \
            -Dusername=${{ secrets.TEAMSCALE_USER }} \
            -DaccessToken=${{ secrets.TEAMSCALE_ACCESSKEY }} \
            -DclassDirectories=target/classes

      - name: Frontend build with coverage
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run coverage
          npm run build

      - name: Upload frontend LCOV to second Teamscale project
        uses: cqse/teamscale-upload-action@v2.9.14
        with:
          server: ${{ secrets.TEAMSCALE_SERVER }}
          project: ${{ secrets.TEAMSCALE_FRONTEND }}
          user: ${{ secrets.TEAMSCALE_USER }}
          accesskey: ${{ secrets.TEAMSCALE_ACCESSKEY }}
          partition: GitHub Actions LCOV
          format: LCOV
          revision: ${{ github.sha }}
          files: frontend/coverage/lcov.info