spring.datasource.url=jdbc:h2:mem:sqsverkehrsapp-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

autobahn.api.base-url=http://localhost:9999

# Retry nur 1 Versuch ? sonst wartet dein Test unnŲtig
resilience4j.retry.instances.autobahnApi.max-attempts=1
resilience4j.retry.instances.autobahnApi.wait-duration=10ms

# Circuit Breaker schnell aktivieren
resilience4j.circuitbreaker.instances.autobahnApi.sliding-window-size=2
resilience4j.circuitbreaker.instances.autobahnApi.minimum-number-of-calls=1
resilience4j.circuitbreaker.instances.autobahnApi.failure-rate-threshold=50