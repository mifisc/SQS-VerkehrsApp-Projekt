spring.application.name=sqs-verkehrsapp
server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/autobahn_safety_monitor}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

springdoc.swagger-ui.path=/swagger-ui.html

app.jwt.secret=${APP_JWT_SECRET:autobahn-safety-monitor-demo-secret-key-2026-safe}
app.jwt.expiration=PT12H
app.external.autobahn.base-url=https://verkehr.autobahn.de/o/autobahn
app.external.autobahn.request-timeout=PT3S
app.external.autobahn.max-retries=2
app.external.autobahn.cache-ttl=PT10M
