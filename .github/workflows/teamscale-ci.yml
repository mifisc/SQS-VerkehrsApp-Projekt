name: Teamscale analysis

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  TEAMSCALE_SERVER: ${{ secrets.TEAMSCALE_SERVER }}
  TEAMSCALE_BACKEND: ${{ secrets.TEAMSCALE_BACKEND }}
  TEAMSCALE_REVISION: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  teamscale:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Check Teamscale secrets
        run: |
          test -n "${{ secrets.TEAMSCALE_SERVER }}" || (echo "TEAMSCALE_SERVER is missing" && exit 1)
          test -n "${{ secrets.TEAMSCALE_USER }}" || (echo "TEAMSCALE_USER is missing" && exit 1)
          test -n "${{ secrets.TEAMSCALE_ACCESSKEY }}" || (echo "TEAMSCALE_ACCESSKEY is missing" && exit 1)
          test -n "${{ secrets.TEAMSCALE_BACKEND }}" || (echo "TEAMSCALE_BACKEND is missing" && exit 1)

      - name: Debug revision
        run: |
          echo "REVISION=${{ github.sha }}"

      - name: Run tests with Teamscale Testwise Coverage
        working-directory: backend/sqs-verkehrsapp
        env:
          TEAMSCALE_SERVER: ${{ secrets.TEAMSCALE_SERVER  }}
          TEAMSCALE_BACKEND: ${{ secrets.TEAMSCALE_BACKEND }}
          TEAMSCALE_USER: ${{ secrets.TEAMSCALE_USER }}
          TEAMSCALE_ACCESSKEY: ${{ secrets.TEAMSCALE_ACCESSKEY }}
        run: ./mvnw -B clean verify -Pteamscale-tia -Dteamscale.revision=${{ env.TEAMSCALE_REVISION }}

      - name: Generate Java JaCoCo report
        working-directory: backend/sqs-verkehrsapp
        run: |
          ./mvnw -B clean verify -Pjacoco

      - name: Upload Java JaCoCo to Teamscale
        uses: cqse/teamscale-upload-action@v2.9.14
        with:
          server: ${{ secrets.TEAMSCALE_SERVER }}
          project: ${{ secrets.TEAMSCALE_BACKEND }}
          user: ${{ secrets.TEAMSCALE_USER }}
          accesskey: ${{ secrets.TEAMSCALE_ACCESSKEY }}
          partition: Unit Tests
          format: JACOCO
          revision: ${{ env.TEAMSCALE_REVISION }}
          files: backend/sqs-verkehrsapp/target/site/jacoco/jacoco.xml

      - name: Frontend build with coverage
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium
          npm run lint
          npm run build
          npx playwright test
          npx nyc report --reporter=lcov

      - name: Upload frontend LCOV to second Teamscale project
        uses: cqse/teamscale-upload-action@v2.9.14
        with:
          server: ${{ secrets.TEAMSCALE_SERVER }}
          project: ${{ secrets.TEAMSCALE_FRONTEND }}
          user: ${{ secrets.TEAMSCALE_USER }}
          accesskey: ${{ secrets.TEAMSCALE_ACCESSKEY }}
          partition: GitHub Actions LCOV
          format: LCOV
          revision: ${{ env.TEAMSCALE_REVISION }}
          files: frontend/coverage/lcov.info

